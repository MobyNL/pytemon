name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    name: Lint, Type-check & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install poetry
          poetry install

      - name: Format check (ruff format)
        run: poetry run ruff format --check pytemon/ tests/

      - name: Lint tests (ruff check)
        run: poetry run ruff check tests/

      - name: Lint source (ruff check — informational)
        run: poetry run ruff check pytemon/
        continue-on-error: true

      - name: Type check (mypy — informational)
        run: poetry run mypy pytemon/
        continue-on-error: true

      - name: Run unit tests
        run: poetry run pytest tests/ --tb=short -v --cov=pytemon --cov-report=term-missing
